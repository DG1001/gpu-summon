name: build-codeserver-image

# Builds and pushes the gpu-summon code-server image (cuda + llama.cpp +
# code-server + caddy) to GHCR. Used by `summon.py --with-codeserver`.
#
# Triggers:
#   - push to main when codeserver/** changes -> rebuild :latest
#   - manual via the Actions tab (workflow_dispatch) for ad-hoc builds
#
# After the FIRST successful build, go to
#   https://github.com/users/<owner>/packages/container/gpu-summon-codeserver/settings
# and switch package visibility to "Public" so vast.ai can pull anonymously.

on:
  push:
    branches: [main]
    paths:
      - 'codeserver/**'
      - '.github/workflows/build-codeserver-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute lowercase image name. GHCR rejects mixed-case repository names,
      # but ${{ github.repository_owner }} preserves the case of the GitHub
      # account (e.g. "Dg1001" -> push fails). Lowercasing here avoids that.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/gpu-summon-codeserver" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./codeserver
          file: ./codeserver/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
